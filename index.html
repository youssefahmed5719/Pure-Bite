<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <!-- السطر ده هو سر تظبيط الشاشة على الموبايل -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Bite | Healthy Eats</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap');
        :root {
            --primary: #2E7D32; --primary-hover: #1B5E20; --accent: #DCE775;
            --bg-color: #f4f7f6; --text-main: #2C3E50; --text-muted: #7F8C8D;
            --white: #ffffff; --shadow: 0 8px 25px rgba(0, 0, 0, 0.05); --border-radius: 16px;
        }
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); }
        .navbar { background-color: var(--white); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
        .nav-tagline { font-weight: 600; color: var(--text-muted); }
        .category-nav { background: var(--white); padding: 20px 40px; display: flex; gap: 15px; overflow-x: auto; border-bottom: 1px solid #eee; }
        .cat-btn { background: #f0f0f0; border: none; padding: 10px 20px; border-radius: 30px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.3s; white-space: nowrap; }
        .cat-btn.active, .cat-btn:hover { background: var(--primary); color: var(--white); }
        .main-container { display: flex; flex-wrap: wrap; padding: 30px 40px; gap: 30px; max-width: 1600px; margin: 0 auto; }
        .menu-section { flex: 1 1 65%; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; align-content: start; }
        .card { background: var(--white); border-radius: var(--border-radius); box-shadow: var(--shadow); padding: 25px; display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(46,125,50,0.1); }
        .card-header { display: flex; justify-content: flex-end; margin-bottom: 5px; min-height: 25px; }
        .allergens { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end;}
        .allergen-badge { background: #FFEBEE; color: #C62828; font-size: 0.7rem; font-weight: 800; padding: 3px 8px; border-radius: 12px; border: 1px solid #EF9A9A; }
        .dish-name { font-size: 1.25rem; font-weight: 800; margin: 5px 0 5px 0; color: var(--primary); line-height: 1.3;}
        .dish-desc { font-size: 0.85rem; color: var(--text-muted); min-height: 40px; margin-bottom: 15px; }
        .macros-bar { display: flex; justify-content: space-between; background: #FAFAFA; border-radius: 10px; padding: 10px; margin-bottom: 15px; text-align: center; border: 1px solid #EEE; }
        .macro-val { display: block; font-weight: 800; color: var(--primary); }
        .macro-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
        .addons-section { flex-grow: 1; margin-bottom: 15px; max-height: 150px; overflow-y: auto; padding-right: 5px;}
        .addons-title { font-size: 0.85rem; font-weight: 800; margin-bottom: 8px; color: var(--text-main); }
        .addon-item { display: flex; justify-content: space-between; padding: 6px 10px; background: #f9f9f9; border-radius: 8px; margin-bottom: 5px; font-size: 0.85rem; cursor: pointer; }
        .addon-item input { accent-color: var(--primary); margin-right: 8px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed #DDD; padding-top: 15px; margin-bottom: 15px; margin-top: auto; }
        .total-price-value { font-size: 1.4rem; font-weight: 800; }
        .btn-add { width: 100%; background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: background 0.3s; }
        .btn-add:hover { background-color: var(--primary-hover); }
        .cart-section { flex: 1 1 30%; background: var(--white); border-radius: var(--border-radius); box-shadow: var(--shadow); padding: 25px; position: sticky; top: 100px; height: fit-content; border: 2px solid #E8F5E9; display: flex; flex-direction: column; }
        .cart-title { font-size: 1.3rem; font-weight: 800; margin-top: 0; border-bottom: 2px solid #EEE; padding-bottom: 15px; color: var(--primary); display: flex; justify-content: space-between; }
        .cart-items-container { min-height: 200px; max-height: 50vh; overflow-y: auto; margin-bottom: 20px; padding-right: 5px; }
        .empty-cart { text-align: center; color: var(--text-muted); font-style: italic; margin-top: 50px; }
        .cart-item { background: #FAFAFA; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .cart-item-details { flex-grow: 1; padding-right: 10px; }
        .cart-item-title { font-weight: 800; font-size: 1rem; margin: 0 0 5px 0; }
        .cart-item-sides { font-size: 0.8rem; color: var(--text-muted); margin: 0 0 8px 0; }
        .cart-item-price { font-weight: 800; color: var(--primary); font-size: 0.95rem;}
        .btn-remove { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; transition: transform 0.2s; opacity: 0.7; }
        .btn-remove:hover { transform: scale(1.15); opacity: 1; }
        .cart-total-section { border-top: 2px dashed #CCC; padding-top: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .grand-total-label { font-size: 1.1rem; font-weight: 600; }
        .grand-total-value { font-size: 1.8rem; font-weight: 800; color: #E64A19; }
        .btn-checkout { background-color: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 1.1rem; font-weight: 800; cursor: pointer; text-align: center; transition: 0.3s; width: 100%; margin-bottom: 10px; }
        .btn-checkout:hover { background-color: var(--primary-hover); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--white); padding: 30px; border-radius: var(--border-radius); width: 90%; max-width: 450px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); text-align: center; }
        .modal-title { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 0 0 10px 0; }
        .payment-options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; text-align: left; }
        .pay-option { display: flex; align-items: center; padding: 15px; border: 2px solid #EEE; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .pay-option.selected { border-color: var(--primary); background: #E8F5E9; }
        .pay-option input { display: none; }
        .btn-confirm-pay { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 1.1rem; font-weight: 800; cursor: pointer; width: 100%; }
        
        .customer-form { text-align: left; margin-bottom: 20px; }
        .form-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #EEE; border-radius: 10px; font-size: 0.95rem; outline: none; transition: 0.3s; font-family: inherit; }
        .form-input:focus { border-color: var(--primary); background: #fdfdfd; }
        .order-type-group { display: flex; gap: 20px; margin-bottom: 15px; font-weight: 600; }
        .order-type-group label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .order-type-group input { accent-color: var(--primary); }

        /* =========================================
           📱 تنسيقات مخصصة لشاشات الموبايل
           ========================================= */
        @media (max-width: 992px) { 
            .cart-section { position: relative; top: 0; flex: 1 1 100%; } 
        }
        
        @media (max-width: 768px) {
            .navbar { padding: 12px 15px; }
            .logo { font-size: 1.4rem; }
            .nav-tagline { font-size: 0.75rem; }
            
            .category-nav { padding: 12px 15px; gap: 10px; }
            .cat-btn { padding: 8px 14px; font-size: 0.85rem; }
            
            .main-container { padding: 15px; gap: 20px; }
            
            .menu-section { grid-template-columns: 1fr; }
            .card { padding: 15px; }
            .dish-name { font-size: 1.15rem; }
            
            .cart-section { padding: 15px; border: 1px solid #E8F5E9; box-shadow: none; }
            
            .modal-content { padding: 20px; width: 95%; max-height: 90vh; overflow-y: auto;}
            .order-type-group { flex-direction: column; gap: 10px; } 
            .pay-option { padding: 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Pure Bite.</div>
        <div class="nav-tagline">Pure Food, Pure Energy </div>
    </nav>

    <div class="category-nav" id="category-nav">
        <button class="cat-btn active" onclick="filterMenu('All', this)">All Items</button>
        <button class="cat-btn" onclick="filterMenu('Appetizers', this)">Appetizers</button>
        <button class="cat-btn" onclick="filterMenu('Soup', this)">Soup</button>
        <button class="cat-btn" onclick="filterMenu('Main Course', this)">Main Course</button>
        <button class="cat-btn" onclick="filterMenu('Salad', this)">Salad</button>
        <button class="cat-btn" onclick="filterMenu('Dessert', this)">Dessert</button>
        <button class="cat-btn" onclick="filterMenu('Beverages', this)">Beverages</button>
    </div>

    <div class="main-container">
        <div class="menu-section" id="menu-container"></div>
        <div class="cart-section">
            <h3 class="cart-title">
                <span>My Order</span>
                <span id="cart-count" style="background: #E8F5E9; padding: 2px 10px; border-radius: 20px; font-size: 1rem;">0</span>
            </h3>
            <div class="cart-items-container" id="cart-container">
                <div class="empty-cart" id="empty-msg">Your cart is empty. Start building your healthy meal!</div>
            </div>
            <div class="cart-total-section">
                <span class="grand-total-label">Total Amount:</span>
                <span class="grand-total-value"><span id="grand-total">0</span> EGP</span>
            </div>
            <button class="btn-checkout" onclick="openPaymentModal()">Checkout & Pay</button>
        </div>
    </div>

    <div class="modal-overlay" id="paymentModal">
        <div class="modal-content">
            <h2 class="modal-title">Secure Checkout </h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Total Amount: <strong id="modal-total-amount" style="color:var(--primary);">0 EGP</strong></p>
            
            <div class="customer-form">
                <input type="text" id="cust-name" class="form-input" placeholder="Full Name " required>
                <input type="tel" id="cust-phone" class="form-input" placeholder="Phone Number " required>
                
                <div class="order-type-group">
                    <label><input type="radio" name="orderType" value="Dine-in" checked onchange="toggleAddress()">  Dine-in </label>
                    <label><input type="radio" name="orderType" value="Delivery" onchange="toggleAddress()">  Delivery </label>
                </div>
                <textarea id="cust-address" class="form-input" placeholder="Delivery Address " style="display: none; resize: vertical; min-height: 80px;"></textarea>
            </div>

            <div class="payment-options">
                <label class="pay-option selected" id="opt-visa" onclick="selectPayment('visa')">
                    <span style="font-size: 1.5rem; margin-right: 15px;"></span> Credit / Debit Card <input type="radio" name="payment" value="Credit Card" checked>
                </label>
                <label class="pay-option" id="opt-apple" onclick="selectPayment('apple')">
                    <span style="font-size: 1.5rem; margin-right: 15px;"></span> Apple Pay <input type="radio" name="payment" value="Apple Pay">
                </label>
                <label class="pay-option" id="opt-cash" onclick="selectPayment('cash')">
                    <span style="font-size: 1.5rem; margin-right: 15px;"></span> Cash on Delivery <input type="radio" name="payment" value="Cash">
                </label>
            </div>
            <button class="btn-confirm-pay" id="confirm-btn" onclick="processPayment()">Confirm Payment </button>
            <button style="background: none; border: none; color: var(--text-muted); margin-top: 15px; font-weight: 600; cursor: pointer; text-decoration: underline;" onclick="closePaymentModal()">Cancel</button>
        </div>
    </div>

        ];

        const addonsOptions = [
            { id: 'sd1', name: 'Mediterranean Grilled Vegetables', price: 60, cal: 93, pro: 1.6, fat: 7.9 },
            { id: 'sd2', name: 'Olive Oil Mashed Potato', price: 72, cal: 264, pro: 4, fat: 12.7 },
            { id: 'sd3', name: 'Classic Air-Fried French Fries', price: 48, cal: 160, pro: 3, fat: 5.2 },
            { id: 'sd4', name: 'Long-Grain Basmati', price: 76, cal: 309, pro: 7.8, fat: 0.7 },
            { id: 'sd5', name: 'Brown Bread', price: 15.5, cal: 281, pro: 11.2, fat: 2.9 },
            { id: 'sc1', name: 'Classic Green Chimichurri', price: 135, cal: 180, pro: 0.1, fat: 20 },
            { id: 'sc2', name: 'Cracked Black Peppercorn Infusion', price: 55.07, cal: 29, pro: 0.7, fat: 2 },
            { id: 'sc3', name: 'Classic Roasted Mushroom Jus', price: 97, cal: 15, pro: 0.7, fat: 0.2 },
            { id: 'sc4', name: 'Lemon-Garlic Herb Infusion', price: 59, cal: 12, pro: 0.6, fat: 0.1 },
            { id: 'sc5', name: 'Healthy Lemon & Dill Sauce', price: 33, cal: 26, pro: 0.5, fat: 2 }
        ];

        let cartOrder = [];

        function renderMenu(filterCategory = 'All') {
            const container = document.getElementById('menu-container');
            container.innerHTML = ''; 
            menuData.forEach(item => {
                if (filterCategory !== 'All' && item.category !== filterCategory) return;
                let allergensHTML = item.allergens && item.allergens.length > 0 ? `<div class="allergens">` + item.allergens.map(a => `<span class="allergen-badge">${a}</span>`).join('') + `</div>` : '';
                let macrosHTML = item.category !== 'Beverages' ? `<div class="macros-bar"><div><span class="macro-val" id="cal-${item.id}">${item.cal}</span><span class="macro-label">Cal</span></div><div><span class="macro-val" id="pro-${item.id}">${item.pro}g</span><span class="macro-label">Pro</span></div><div><span class="macro-val" id="fat-${item.id}">${item.fat}g</span><span class="macro-label">Fat</span></div></div>` : '';
                
                let addonsHTML = '';
                if (item.category === 'Main Course') {
                    let addonsList = addonsOptions.map(opt => `<label class="addon-item"><div><input type="checkbox" name="addon_${item.id}" value="${opt.id}" data-name="${opt.name}" onchange="updatePreview('${item.id}')"> ${opt.name}</div><span>+${opt.price} EGP</span></label>`).join('');
                    addonsHTML = `<div class="addons-section"><div class="addons-title">Sides & Sauces:</div>${addonsList}</div>`;
                }
                container.innerHTML += `<div class="card"><div class="card-header">${allergensHTML}</div><h2 class="dish-name">${item.name}</h2><p class="dish-desc">${item.desc}</p>${macrosHTML}${addonsHTML}<div class="card-footer"><span class="total-price-value" id="price-${item.id}">${item.price} EGP</span></div><button class="btn-add" onclick="addToCart('${item.id}')">Add to Cart</button></div>`;
            });
        }

        function filterMenu(category, element = null) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            if (element) { element.classList.add('active'); } 
            else { const targetBtn = Array.from(document.querySelectorAll('.cat-btn')).find(btn => btn.innerText.includes(category)); if(targetBtn) targetBtn.classList.add('active'); }
            renderMenu(category);
        }

        function updatePreview(itemId) {
            const base = menuData.find(i => i.id === itemId);
            let addedPrice = 0, addedCal = 0, addedPro = 0, addedFat = 0;
            document.querySelectorAll(`input[name="addon_${itemId}"]:checked`).forEach(chk => {
                const addon = addonsOptions.find(opt => opt.id === chk.value);
                addedPrice += addon.price; addedCal += addon.cal; addedPro += addon.pro; addedFat += addon.fat;
            });
            document.getElementById(`price-${itemId}`).innerText = (base.price + addedPrice).toFixed(2) + " EGP";
            if (document.getElementById(`cal-${itemId}`)) {
                document.getElementById(`cal-${itemId}`).innerText = (base.cal + addedCal).toFixed(0);
                document.getElementById(`pro-${itemId}`).innerText = (base.pro + addedPro).toFixed(1) + "g";
                document.getElementById(`fat-${itemId}`).innerText = (base.fat + addedFat).toFixed(1) + "g";
            }
        }

        function addToCart(itemId) {
            const base = menuData.find(i => i.id === itemId);
            let itemTotalPrice = base.price; let selectedAddonsNames = [];
            const checkboxes = document.querySelectorAll(`input[name="addon_${itemId}"]:checked`);
            checkboxes.forEach(chk => {
                const addon = addonsOptions.find(opt => opt.id === chk.value);
                itemTotalPrice += addon.price; selectedAddonsNames.push(chk.getAttribute('data-name'));
            });
            cartOrder.push({ name: base.name, addons: selectedAddonsNames.length > 0 ? selectedAddonsNames.join(', ') : null, price: parseFloat(itemTotalPrice.toFixed(2)) });
            checkboxes.forEach(chk => chk.checked = false);
            if (checkboxes.length > 0) updatePreview(itemId); 
            renderCart();
        }

        function removeFromCart(index) { cartOrder.splice(index, 1); renderCart(); }

        function renderCart() {
            const container = document.getElementById('cart-container');
            const emptyMsg = document.getElementById('empty-msg');
            const grandTotalEl = document.getElementById('grand-total');
            document.getElementById('cart-count').innerText = cartOrder.length;
            container.innerHTML = ''; let grandTotal = 0;

            if (cartOrder.length === 0) { container.appendChild(emptyMsg); emptyMsg.style.display = 'block'; grandTotalEl.innerText = '0'; return; }

            cartOrder.forEach((item, index) => {
                grandTotal += item.price;
                let addonsHTML = item.addons ? `<p class="cart-item-sides">Adds: ${item.addons}</p>` : '';
                container.innerHTML += `<div class="cart-item"><div class="cart-item-details"><h4 class="cart-item-title">${item.name}</h4>${addonsHTML}<div class="cart-item-price">${item.price} EGP</div></div><button class="btn-remove" onclick="removeFromCart(${index})" title="Remove">🗑️</button></div>`;
            });
            grandTotalEl.innerText = grandTotal.toFixed(2);
        }

        function openPaymentModal() {
            if (cartOrder.length === 0) { alert("Your cart is empty. Please add items to checkout."); return; }
            document.getElementById('modal-total-amount').innerText = document.getElementById('grand-total').innerText + " EGP";
            document.getElementById('paymentModal').style.display = 'flex';
        }

        function closePaymentModal() { document.getElementById('paymentModal').style.display = 'none'; }
        
        function selectPayment(type) {
            document.querySelectorAll('.pay-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('opt-' + type).classList.add('selected');
            document.querySelector(`#opt-${type} input`).checked = true;
        }

        function toggleAddress() {
            const orderType = document.querySelector('input[name="orderType"]:checked').value;
            const addressInput = document.getElementById('cust-address');
            if (orderType === 'Delivery') { addressInput.style.display = 'block'; } 
            else { addressInput.style.display = 'none'; }
        }

        function processPayment() {
            const custName = document.getElementById('cust-name').value.trim();
            const custPhone = document.getElementById('cust-phone').value.trim();
            const orderType = document.querySelector('input[name="orderType"]:checked').value;
            const custAddress = document.getElementById('cust-address').value.trim();

            if (!custName || !custPhone) { alert("Please enter your Name and Phone number!"); return; }
            if (orderType === 'Delivery' && !custAddress) { alert("Please enter your Delivery Address!"); return; }

            document.getElementById('confirm-btn').innerText = "Processing... ⏳";
            document.getElementById('confirm-btn').disabled = true;

            const selectedMethod = document.querySelector('input[name="payment"]:checked').value;
            let grandTotal = 0; cartOrder.forEach(item => grandTotal += item.price);

            let newOrder = {
                order_id: 'ORD-' + Math.floor(Math.random() * 10000),
                date_time: new Date().toLocaleString('en-EG'), 
                customer_info: {
                    name: custName,
                    phone: custPhone,
                    order_type: orderType,
                    delivery_address: orderType === 'Delivery' ? custAddress : 'N/A (Dine-in)'
                },
                order_details: cartOrder.map(item => ({
                    item_name: item.name,
                    add_ons: item.addons || 'None',
                    item_price: item.price
                })),
                total_amount: grandTotal.toFixed(2),
                payment_method: selectedMethod
            };
            
            if(window.sendToFirebase) {
                window.sendToFirebase(newOrder);
            } else {
                alert("System connection error. Please refresh the page.");
            }
        }

        window.onload = () => { renderMenu('All'); };
    </script>

      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCP41US60Vu14s1WB_kDubWS4GyC8nWwoc",
        authDomain: "pure-bite-10c08.firebaseapp.com",
        databaseURL: "https://pure-bite-10c08-default-rtdb.firebaseio.com", 
        projectId: "pure-bite-10c08",
        storageBucket: "pure-bite-10c08.firebasestorage.app",
        messagingSenderId: "918481070076",
        appId: "1:918481070076:web:1de15defa968b917f53479"
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      window.sendToFirebase = function(newOrder) {
          const ordersRef = ref(db, 'live_orders');
          const newOrderRef = push(ordersRef);
          set(newOrderRef, newOrder).then(() => {
              alert(`Order Confirmed! \n\nName: ${newOrder.customer_info.name}\nOrder ID: ${newOrder.order_id}\nType: ${newOrder.customer_info.order_type}\n\nThe page will now refresh.`);
              window.location.reload();
          }).catch((error) => {
              console.error("Firebase Error:", error);
              alert("Something went wrong with the connection!");
              document.getElementById('confirm-btn').innerText = "Confirm Payment ";
              document.getElementById('confirm-btn').disabled = false;
          });
      };
    </script>
